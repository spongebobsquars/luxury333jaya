<!DOCTYPE html>
<html lang="id">

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:'Press Start 2P',cursive;

    background-image:
    linear-gradient(
    rgba(255,255,255,.03) 1px,
    transparent 1px),

    linear-gradient(
    90deg,
    rgba(255,255,255,.03) 1px,
    transparent 1px);

    background-size:20px 20px;
}

.pixel-landing{

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:30px;
}

.pixel-character img{

    width:280px;

    image-rendering:pixelated;

    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }
}

.pixel-level{

    display:inline-block;

    margin-top:20px;

    color:#00ff88;

    font-size:12px;
}

.pixel-content h1{

    font-size:32px;

    margin:20px 0;
}

.pixel-content p{

    font-size:12px;

    color:#cbd5e1;

    line-height:2;
}

.pixel-buttons{

    margin-top:35px;

    display:flex;

    gap:20px;

    flex-wrap:wrap;

    justify-content:center;
}

.pixel-btn{

    background:#00ff88;

    color:#000;

    text-decoration:none;

    padding:18px 26px;

    border:4px solid #fff;

    box-shadow:
    6px 6px 0 #000;

    transition:.2s;
}

.pixel-btn:hover{

    transform:
    translate(3px,3px);

    box-shadow:
    3px 3px 0 #000;
}

</style>

<section class="pixel-landing">

    <div class="pixel-character">

        <img
        src="URL-GAMBAR-PIXEL.webp"
        alt="Luxury333">

    </div>

    <div class="pixel-content">

        <span class="pixel-level">
            LEVEL 69
        </span>

        <h1>
            LUXURY333
        </h1>

        <p>
            PRESS LOGIN TO ENTER
        </p>

        <div class="pixel-buttons">

            <a href="LINK_LOGIN"
               class="pixel-btn">

               LOGIN

            </a>

            <a href="LINK_DAFTAR"
               class="pixel-btn">

               DAFTAR

            </a>

        </div>

    </div>

</section>

</body>
<html>
